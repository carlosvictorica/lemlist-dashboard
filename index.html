<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemlist Campaign Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #9a9a9a;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --green: #3B6D11; --green-bg: #EAF3DE;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --red: #A32D2D; --red-bg: #FCEBEB;
    --teal: #0F6E56; --teal-bg: #E1F5EE;
    --purple: #534AB7; --purple-bg: #EEEDFE;
    --coral: #993C1D; --coral-bg: #FAECE7;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 15px; font-weight: 500; }
  .logo span { color: var(--text2); font-weight: 400; }
  .last-updated { font-size: 12px; color: var(--text3); margin-left: 12px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
  .status-text { font-size: 12px; color: var(--text2); }
  .btn { font-size: 13px; padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .main { max-width: 1280px; margin: 0 auto; padding: 2rem; }
  .filters-bar { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pill[data-market="Field"].active { background: var(--purple); color: #fff; border-color: var(--purple); }
  .divider { width: 0.5px; height: 24px; background: var(--border); }
  select { font-size: 12px; padding: 5px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; }
  .custom-range { display: none; align-items: center; gap: 6px; }
  .custom-range.visible { display: flex; }
  .custom-range input { font-size: 12px; padding: 4px 8px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .kpi-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 500; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
  .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .market-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .market-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .market-tag { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .tag-US { background: var(--blue-bg); color: var(--blue); }
  .tag-UKI { background: var(--teal-bg); color: var(--teal); }
  .tag-DACH { background: var(--amber-bg); color: var(--amber); }
  .tag-FR { background: var(--coral-bg); color: var(--coral); }
  .tag-Field { background: var(--purple-bg); color: var(--purple); }
  .tag-Other { background: var(--bg3); color: var(--text2); }
  .mstat { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .mstat:last-child { border-bottom: none; }
  .mstat-label { color: var(--text2); }
  .mstat-val { font-weight: 500; }
  .table-section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem; }
  .table-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text2); padding: 8px 12px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  tbody td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg2); }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-gray { background: var(--bg3); color: var(--text2); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
  .bar-bg { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .cam-name { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cam-status { font-size: 11px; padding: 2px 7px; border-radius: 20px; border: 0.5px solid var(--border); color: var(--text2); }
  .cam-status.running { background: var(--green-bg); color: var(--green); border-color: var(--green-bg); }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
  .tab { font-size: 13px; padding: 8px 18px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .field-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 20px; background: var(--purple-bg); color: var(--purple); margin-left: 4px; vertical-align: middle; }
  input[type="search"] { font-size: 12px; padding: 5px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  @media (max-width: 768px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .main { padding: 1rem; } }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <div class="logo">Lemlist <span>/ Campaign dashboard</span></div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Loading...</div>
  </div>
</div>

<div class="main">
  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Market</span>
      <div class="pill-group" id="marketFilter">
        <div class="pill active" data-market="all">All</div>
        <div class="pill" data-market="US">US</div>
        <div class="pill" data-market="UKI">UKI</div>
        <div class="pill" data-market="DACH">DACH</div>
        <div class="pill" data-market="FR">FR</div>
        <div class="pill" data-market="Field">Field</div>
        <div class="pill" data-market="Other">Other</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <select id="statusFilter" onchange="render()">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="ended">Ended</option>
        <option value="paused">Paused</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Period</span>
      <select id="dateFilter" onchange="onDateFilterChange()">
        <option value="all">All time</option>
        <option value="this_week">This week</option>
        <option value="last_week">Last week</option>
        <option value="this_month">This month</option>
        <option value="last_month">Last month</option>
        <option value="this_quarter">This quarter</option>
        <option value="last_quarter">Last quarter</option>
        <option value="this_year">This year</option>
        <option value="custom">Custom range</option>
      </select>
    </div>
    <div class="custom-range" id="customRange">
      <input type="date" id="dateFrom" onchange="render()" />
      <span style="font-size:12px;color:var(--text2)">to</span>
      <input type="date" id="dateTo" onchange="render()" />
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Open rate</div><div class="kpi-value" id="kpiOpen">—</div><div class="kpi-sub" id="kpiOpenSub"></div></div>
    <div class="kpi-card"><div class="kpi-label">Click rate</div><div class="kpi-value" id="kpiClick">—</div><div class="kpi-sub" id="kpiClickSub"></div></div>
    <div class="kpi-card"><div class="kpi-label">Reply rate</div><div class="kpi-value" id="kpiReply">—</div><div class="kpi-sub" id="kpiReplySub"></div></div>
    <div class="kpi-card"><div class="kpi-label">Bounce rate</div><div class="kpi-value" id="kpiBounce">—</div><div class="kpi-sub" id="kpiBounceSub"></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="market" onclick="switchTab(this)">Market overview</div>
    <div class="tab" data-tab="campaigns" onclick="switchTab(this)">Campaign breakdown</div>
  </div>

  <div id="tab-market">
    <div class="section-label">Performance by market</div>
    <div class="market-grid" id="marketGrid"></div>
  </div>

  <div id="tab-campaigns" style="display:none">
    <div class="table-section">
      <div class="table-header">
        <span class="section-label" style="margin:0" id="campaignCount"></span>
        <input type="search" id="searchBox" placeholder="Search campaigns..." oninput="render()" style="width:200px" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:24%">Campaign</th>
              <th style="width:8%">Market</th>
              <th style="width:7%">Status</th>
              <th style="width:7%">Leads</th>
              <th style="width:11%">Open rate</th>
              <th style="width:11%">Click rate</th>
              <th style="width:11%">Reply rate</th>
              <th style="width:8%">Bounce</th>
              <th style="width:13%">Signal</th>
            </tr>
          </thead>
          <tbody id="campaignBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let allCampaigns = [];
let currentMarket = 'all';

function pct(n, d) { return d > 0 ? (n / d * 100) : 0; }
function fmt(v) { return v.toFixed(1) + '%'; }

function signal(c) {
  const or = pct(c.opened, c.messagesSent);
  const rr = pct(c.replied, c.messagesSent);
  const br = pct(c.messagesBounced, c.messagesSent);
  if (br >= 6) return ['badge-amber', 'Bounce risk'];
  if (or >= 40 && rr >= 5) return ['badge-green', 'Top performer'];
  if (or < 25 || rr < 2) return ['badge-red', 'Needs review'];
  return ['badge-gray', 'On track'];
}

function getDateRange(filter) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const d = now.getDate();
  const dow = now.getDay();

  switch(filter) {
    case 'this_week': {
      const start = new Date(now);
      start.setDate(d - (dow === 0 ? 6 : dow - 1));
      start.setHours(0,0,0,0);
      return { from: start, to: now };
    }
    case 'last_week': {
      const start = new Date(now);
      start.setDate(d - (dow === 0 ? 6 : dow - 1) - 7);
      start.setHours(0,0,0,0);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23,59,59,999);
      return { from: start, to: end };
    }
    case 'this_month':
      return { from: new Date(y, m, 1), to: now };
    case 'last_month':
      return { from: new Date(y, m-1, 1), to: new Date(y, m, 0, 23, 59, 59) };
    case 'this_quarter': {
      const q = Math.floor(m / 3);
      return { from: new Date(y, q*3, 1), to: now };
    }
    case 'last_quarter': {
      const q = Math.floor(m / 3);
      const lq = q === 0 ? 3 : q - 1;
      const ly = q === 0 ? y - 1 : y;
      return { from: new Date(ly, lq*3, 1), to: new Date(ly, lq*3+3, 0, 23, 59, 59) };
    }
    case 'this_year':
      return { from: new Date(y, 0, 1), to: now };
    case 'custom': {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      return {
        from: from ? new Date(from) : null,
        to: to ? new Date(to + 'T23:59:59') : null
      };
    }
    default: return null;
  }
}

function onDateFilterChange() {
  const filter = document.getElementById('dateFilter').value;
  const customRange = document.getElementById('customRange');
  customRange.classList.toggle('visible', filter === 'custom');
  render();
}

async function loadData() {
  try {
    const res = await fetch('lemlist-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('lemlist-data.json not found');
    const json = await res.json();
    allCampaigns = json.campaigns || [];
    const d = new Date(json.generatedAt);
    document.getElementById('lastUpdated').textContent = 'Data from ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString();
    document.getElementById('statusDot').style.background = '#639922';
    document.getElementById('statusText').textContent = allCampaigns.length + ' campaigns';
    render();
  } catch(e) {
    document.getElementById('statusDot').style.background = '#E24B4A';
    document.getElementById('statusText').textContent = 'No data file found';
  }
}

function getFiltered() {
  const sf = document.getElementById('statusFilter')?.value || 'all';
  const s = (document.getElementById('searchBox')?.value || '').toLowerCase();
  const dateFilter = document.getElementById('dateFilter')?.value || 'all';
  const range = dateFilter !== 'all' ? getDateRange(dateFilter) : null;

  return allCampaigns.filter(c => {
    if (currentMarket === 'Field' && !c.isField) return false;
    if (currentMarket !== 'all' && currentMarket !== 'Field' && c.market !== currentMarket) return false;
    if (sf === 'active' && c.status !== 'running') return false;
    if (sf === 'ended' && c.status !== 'ended') return false;
    if (sf === 'paused' && c.status !== 'paused') return false;
    if (sf === 'archived' && c.status !== 'archived') return false;
    if (s && !c.name.toLowerCase().includes(s)) return false;
    if (range && c.createdAt) {
      const created = new Date(c.createdAt);
      if (range.from && created < range.from) return false;
      if (range.to && created > range.to) return false;
    }
    return true;
  });
}

function aggKPIs(rows) {
  const sent = rows.reduce((s,r) => s + r.messagesSent, 0);
  const opened = rows.reduce((s,r) => s + r.opened, 0);
  const clicked = rows.reduce((s,r) => s + r.clicked, 0);
  const replied = rows.reduce((s,r) => s + r.replied, 0);
  const bounced = rows.reduce((s,r) => s + r.messagesBounced, 0);
  return { sent, opened, clicked, replied, bounced,
    open: pct(opened,sent), click: pct(clicked,sent),
    reply: pct(replied,sent), bounce: pct(bounced,sent) };
}

function render() {
  const rows = getFiltered();
  const k = aggKPIs(rows);
  document.getElementById('kpiOpen').textContent = fmt(k.open);
  document.getElementById('kpiClick').textContent = fmt(k.click);
  document.getElementById('kpiReply').textContent = fmt(k.reply);
  document.getElementById('kpiBounce').textContent = fmt(k.bounce);
  document.getElementById('kpiOpenSub').textContent = k.opened.toLocaleString() + ' opens · ' + k.sent.toLocaleString() + ' sent';
  document.getElementById('kpiClickSub').textContent = k.clicked.toLocaleString() + ' total clicks';
  document.getElementById('kpiReplySub').textContent = k.replied.toLocaleString() + ' total replies';
  document.getElementById('kpiBounceSub').textContent = k.bounced.toLocaleString() + ' bounced';
  renderMarkets();
  renderCampaigns(rows);
}

function renderMarkets() {
  const filtered = getFiltered();
  document.getElementById('marketGrid').innerHTML = ['US','UKI','DACH','FR','Field','Other'].map(mkt => {
    const rows = mkt === 'Field'
      ? filtered.filter(c => c.isField)
      : filtered.filter(c => c.market === mkt);
    if (!rows.length) return '';
    const k = aggKPIs(rows);
    return `<div class="market-card">
      <div class="market-header">
        <span class="market-tag tag-${mkt}">${mkt === 'Field' ? 'Field marketing' : mkt}</span>
        <span style="font-size:12px;color:var(--text2)">${rows.length} campaign${rows.length!==1?'s':''}</span>
      </div>
      <div class="mstat"><span class="mstat-label">Leads</span><span class="mstat-val">${rows.reduce((s,r)=>s+r.nbLeads,0).toLocaleString()}</span></div>
      <div class="mstat"><span class="mstat-label">Messages sent</span><span class="mstat-val">${k.sent.toLocaleString()}</span></div>
      <div class="mstat"><span class="mstat-label">Open rate</span><span class="mstat-val">${fmt(k.open)}</span></div>
      <div class="mstat"><span class="mstat-label">Click rate</span><span class="mstat-val">${fmt(k.click)}</span></div>
      <div class="mstat"><span class="mstat-label">Reply rate</span><span class="mstat-val">${fmt(k.reply)}</span></div>
      <div class="mstat"><span class="mstat-label">Bounce rate</span><span class="mstat-val" style="color:${k.bounce>=6?'var(--red)':'inherit'}">${fmt(k.bounce)}</span></div>
    </div>`;
  }).join('');
}

function renderCampaigns(rows) {
  const sorted = [...rows].sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
  document.getElementById('campaignCount').textContent = sorted.length + ' campaigns';
  if (!sorted.length) {
    document.getElementById('campaignBody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text2);font-size:13px">No campaigns match your filters.</td></tr>';
    return;
  }
  const bar = (v, max, color) =>
    `<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(v/max*100,100).toFixed(0)}%;background:${color}"></div></div><span style="font-size:12px;min-width:36px;text-align:right">${fmt(v)}</span></div>`;
  document.getElementById('campaignBody').innerHTML = sorted.map(c => {
    const or = pct(c.opened, c.messagesSent);
    const cr = pct(c.clicked, c.messagesSent);
    const rr = pct(c.replied, c.messagesSent);
    const br = pct(c.messagesBounced, c.messagesSent);
    const [sigCls, sigLabel] = signal(c);
    const isRunning = c.status === 'running';
    const statusLabel = isRunning ? 'active' : c.status;
    const fieldBadge = c.isField ? '<span class="field-badge">Field</span>' : '';
    return `<tr>
      <td><div class="cam-name" title="${c.name}"><a href="https://app.lemlist.com/teams/tea_th6x545B9uRHQ4dty/campaigns-next/${c.id}${c.sequenceId ? '/sequences/' + c.sequenceId : ''}/overview" target="_blank" style="color:var(--text);text-decoration:none;border-bottom:0.5px solid var(--border2);">${c.name}</a>${fieldBadge}</div></td>
      <td><span class="market-tag tag-${c.market}" style="font-size:11px;padding:2px 7px;border-radius:20px">${c.market}</span></td>
      <td><span class="cam-status ${isRunning ? 'running' : ''}">${statusLabel}</span></td>
      <td>${c.nbLeads.toLocaleString()}</td>
      <td>${bar(or,80,'#378ADD')}</td>
      <td>${bar(cr,20,'#1D9E75')}</td>
      <td>${bar(rr,15,'#D85A30')}</td>
      <td style="color:${br>=6?'var(--red)':'var(--text)'}">${fmt(br)}</td>
      <td><span class="badge ${sigCls}">${sigLabel}</span></td>
    </tr>`;
  }).join('');
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const tab = el.dataset.tab;
  document.getElementById('tab-market').style.display = tab === 'market' ? '' : 'none';
  document.getElementById('tab-campaigns').style.display = tab === 'campaigns' ? '' : 'none';
}

document.querySelectorAll('#marketFilter .pill').forEach(p => {
  p.onclick = () => {
    document.querySelectorAll('#marketFilter .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentMarket = p.dataset.market;
    render();
  };
});

loadData();
</script>
</body>
</html>
